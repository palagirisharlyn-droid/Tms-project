<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participant Dashboard - TMS</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
        }
        .header {
            background-color: #28a745;
            color: white;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }
        h3 { 
            margin-top: 0; 
            color: #333; 
            border-bottom: 2px solid #28a745; 
            padding-bottom: 5px; 
        }
        .info-box {
            background: #e9ecef;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .status-good {
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Participant Dashboard</h2>
        <p>Welcome, Ramesh</p>
    </div>

    <!-- స్టూడెంట్ కోర్సు వివరాలు -->
    <div class="card">
        <h3>My Enrolled Courses</h3>
        <div class="info-box">
            <strong>Course:</strong> Web Development <br>
            <strong>Trainer:</strong> Suresh Kumar <br>
            <strong>Timing:</strong> 10:00 AM - 12:00 PM
        </div>
    </div>

    <!-- స్టూడెంట్ అటెండెన్స్ రిపోర్ట్ -->
    <div class="card">
        <h3>My Attendance Report</h3>
        <div class="info-box">
            <strong>Total Classes:</strong> 20 <br>
            <strong>Classes Attended:</strong> 18 <br>
            <strong>Attendance Percentage:</strong> <span class="status-good">90%</span>
        </div>
    </div>

</body>    <div style="text-align: center; margin-top: 20px;">
        <button type="button" onclick="window.location.href='login.html'" style="background-color: #dc3545; color: white; border: none; padding: 10px; border-radius: 4px; width: 100%; cursor: pointer;">Logout</button>
    </div>

</html>
